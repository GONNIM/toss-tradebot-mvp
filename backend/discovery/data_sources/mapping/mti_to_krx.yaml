# **검수 권장** — 매핑 정확도가 주도주 선정·상관 분석 신뢰도에 직결.
# 각 종목은 시총(FDR Marcap) + 해당 품목 매출 비중(DART, 추후) 으로 score.
#
# - code: KRX 6자리 종목 코드
# - name: 종목명 (검증/추적 용 — 실제 매칭은 code 기준)
# - export_ratio_hint: 해외매출비중 추정값 0.0~1.0 (DART 보강 전 임시값, 대표 종목엔 0.8~)
# - notes: 매핑 근거 또는 주의사항
#
# 한 종목이 여러 품목에 걸치는 경우 (예: 삼성전자 = 반도체+가전+무선통신) → 주력만 명시.

