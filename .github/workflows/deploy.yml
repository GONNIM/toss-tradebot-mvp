# GitHub Actions — Deploy to optimus8.cafe24.com (결정 42)
#
# 활성 secrets (GONNIM/toss-tradebot-mvp):
#   - OPTIMUS8_SSH_KEY   (deploy 전용 ed25519 private key)
#   - OPTIMUS8_HOST      = optimus8.cafe24.com
#   - OPTIMUS8_USER      = root
#
# 가드레일 (글로벌 §1): 평문 자격증명 절대 workflow yml 작성 금지. Secrets 사용.

name: Deploy to optimus8

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend syntax check
        run: |
          if [ -d "backend" ]; then
            python3 -m compileall backend/ -q
          fi

      - name: Frontend package.json 검증
        run: |
          if [ -f "frontend/package.json" ]; then
            node -e "JSON.parse(require('fs').readFileSync('frontend/package.json'))"
            echo "frontend/package.json OK"
          fi

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH (key-based)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OPTIMUS8_SSH_KEY }}

      - name: Add host fingerprint
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.OPTIMUS8_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ────────────────────────────────────────────────────────────
      # backend/.env sync — SOPS 우선, 미셋업 시 legacy inject fallback
      # 상세: docs/operations/secrets-management.md
      # ────────────────────────────────────────────────────────────

      - name: Setup SOPS + age (only when backend/.env.sops.yaml exists)
        if: hashFiles('backend/.env.sops.yaml') != ''
        run: |
          set -e
          SOPS_VERSION="v3.13.2"
          AGE_VERSION="v1.2.1"
          echo "→ install sops ${SOPS_VERSION} · age ${AGE_VERSION}"
          sudo curl -sSfL \
            "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" \
            -o /usr/local/bin/sops
          sudo chmod +x /usr/local/bin/sops
          curl -sSfL \
            "https://github.com/FiloSottile/age/releases/download/${AGE_VERSION}/age-${AGE_VERSION}-linux-amd64.tar.gz" \
            | tar xz -C /tmp
          sudo mv /tmp/age/age /tmp/age/age-keygen /usr/local/bin/
          sops --version
          age --version
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Sync backend/.env via SOPS
        if: hashFiles('backend/.env.sops.yaml') != ''
        env:
          SOPS_AGE_KEY_FILE: /home/runner/.config/sops/age/keys.txt
        run: |
          set -e
          echo "→ decrypt SOPS → dotenv (임시 파일)"
          sops -d --output-type=dotenv backend/.env.sops.yaml > /tmp/backend.env
          chmod 600 /tmp/backend.env
          echo "→ 서버에 원자적 반영 (.env.new → mv .env, 기존 .env 자동 백업)"
          scp -o StrictHostKeyChecking=no /tmp/backend.env \
              ${{ secrets.OPTIMUS8_USER }}@${{ secrets.OPTIMUS8_HOST }}:/root/toss-tradebot-mvp/backend/.env.new
          ssh ${{ secrets.OPTIMUS8_USER }}@${{ secrets.OPTIMUS8_HOST }} 'bash -s' << 'REMOTE_EOF'
          set -e
          cd /root/toss-tradebot-mvp/backend
          if [ -f .env ]; then
            cp .env ".env.bak.$(date +%Y%m%d-%H%M%S)"
          fi
          mv .env.new .env
          chmod 600 .env
          # .env.bak.* 는 최근 10개만 유지
          ls -1t .env.bak.* 2>/dev/null | tail -n +11 | xargs -r rm -f
          echo "✓ backend/.env replaced from SOPS"
          REMOTE_EOF
          shred -u /tmp/backend.env 2>/dev/null || rm -f /tmp/backend.env

      - name: Legacy inject (fallback — SOPS 파일 없을 때만)
        if: hashFiles('backend/.env.sops.yaml') == ''
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # SOPS 방식 완전 전환 후 이 스텝은 자동 skip.
          ssh ${{ secrets.OPTIMUS8_USER }}@${{ secrets.OPTIMUS8_HOST }} 'bash -s' << EOF
          ENV_FILE=/root/toss-tradebot-mvp/backend/.env
          update_env() {
            local key="\$1"
            local val="\$2"
            if [ -n "\$val" ]; then
              sed -i "/^\${key}=/d" "\$ENV_FILE" 2>/dev/null || true
              echo "\${key}=\${val}" >> "\$ENV_FILE"
              echo "✓ \$key synced"
            else
              echo "⚠️ \$key secret 미설정 — skip (기존 값 유지)"
            fi
          }
          update_env DART_API_KEY "${DART_API_KEY}"
          update_env TELEGRAM_BOT_TOKEN "${TELEGRAM_BOT_TOKEN}"
          update_env TELEGRAM_CHAT_ID "${TELEGRAM_CHAT_ID}"
          chmod 600 "\$ENV_FILE"
          EOF

      - name: Deploy to optimus8
        run: |
          ssh ${{ secrets.OPTIMUS8_USER }}@${{ secrets.OPTIMUS8_HOST }} 'bash -s' << 'EOF'
          set -e
          cd /root/toss-tradebot-mvp
          echo "[1/5] sync to origin/main"
          # ── origin/main single source of truth. npm install 이 lockfile 재생성해도 매번 안전.
          # ── .gitignore (.venv/.next/node_modules/data/) 항목은 reset 영향 없음.
          git fetch --quiet origin main
          BEFORE=$(git rev-parse --short HEAD)
          git reset --hard origin/main
          AFTER=$(git rev-parse --short HEAD)
          echo "  $BEFORE → $AFTER"

          echo "[2/5] backend deps"
          cd backend
          .venv/bin/pip install -e ".[dev]" -q

          echo "[3/5] frontend build"
          cd ../frontend
          npm install --legacy-peer-deps --silent
          npm run build

          echo "[4/5] systemd restart"
          systemctl restart tradebot-api tradebot-cron

          echo "[5/5] pm2 reload"
          pm2 reload tradebot-web

          echo "✅ deploy complete"
          EOF

      - name: Verify deployment
        run: |
          # backend systemctl restart 후 uvicorn startup 완료까지 대기.
          # 5s 는 부족 (application startup 중 502) → 20s + 재시도.
          sleep 20
          for i in 1 2 3; do
            if curl -sSf https://${{ secrets.OPTIMUS8_HOST }}/health; then
              echo "✓ health OK"
              exit 0
            fi
            echo "retry $i/3 in 10s..."
            sleep 10
          done
          echo "✗ health check failed after 3 retries"
          exit 1
