# GitHub Actions — Deploy to optimus8.cafe24.com (결정 42)
#
# 활성 secrets (GONNIM/toss-tradebot-mvp):
#   - OPTIMUS8_SSH_KEY   (deploy 전용 ed25519 private key)
#   - OPTIMUS8_HOST      = optimus8.cafe24.com
#   - OPTIMUS8_USER      = root
#
# 가드레일 (글로벌 §1): 평문 자격증명 절대 workflow yml 작성 금지. Secrets 사용.

name: Deploy to optimus8

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend syntax check
        run: |
          if [ -d "backend" ]; then
            python3 -m compileall backend/ -q
          fi

      - name: Frontend package.json 검증
        run: |
          if [ -f "frontend/package.json" ]; then
            node -e "JSON.parse(require('fs').readFileSync('frontend/package.json'))"
            echo "frontend/package.json OK"
          fi

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH (key-based)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OPTIMUS8_SSH_KEY }}

      - name: Add host fingerprint
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.OPTIMUS8_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Inject runtime secrets into backend/.env
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          # GitHub Secrets → 운영 backend/.env 동기화. 빈 secret 은 skip.
          # heredoc EOF (no quotes) 로 변수 확장 — ssh 로 ${VAR} 만 전송.
          if [ -n "${DART_API_KEY}" ]; then
            ssh ${{ secrets.OPTIMUS8_USER }}@${{ secrets.OPTIMUS8_HOST }} 'bash -s' << EOF
          ENV_FILE=/root/toss-tradebot-mvp/backend/.env
          sed -i '/^DART_API_KEY=/d' "\$ENV_FILE" 2>/dev/null || true
          echo "DART_API_KEY=${DART_API_KEY}" >> "\$ENV_FILE"
          chmod 600 "\$ENV_FILE"
          echo "✓ DART_API_KEY synced to .env"
          EOF
          else
            echo "⚠️ DART_API_KEY secret 미설정 — skip"
          fi

      - name: Deploy to optimus8
        run: |
          ssh ${{ secrets.OPTIMUS8_USER }}@${{ secrets.OPTIMUS8_HOST }} 'bash -s' << 'EOF'
          set -e
          cd /root/toss-tradebot-mvp
          echo "[1/5] sync to origin/main"
          # ── origin/main single source of truth. npm install 이 lockfile 재생성해도 매번 안전.
          # ── .gitignore (.venv/.next/node_modules/data/) 항목은 reset 영향 없음.
          git fetch --quiet origin main
          BEFORE=$(git rev-parse --short HEAD)
          git reset --hard origin/main
          AFTER=$(git rev-parse --short HEAD)
          echo "  $BEFORE → $AFTER"

          echo "[2/5] backend deps"
          cd backend
          .venv/bin/pip install -e ".[dev]" -q

          echo "[3/5] frontend build"
          cd ../frontend
          npm install --legacy-peer-deps --silent
          npm run build

          echo "[4/5] systemd restart"
          systemctl restart tradebot-api tradebot-cron

          echo "[5/5] pm2 reload"
          pm2 reload tradebot-web

          echo "✅ deploy complete"
          EOF

      - name: Verify deployment
        run: |
          # backend systemctl restart 후 uvicorn startup 완료까지 대기.
          # 5s 는 부족 (application startup 중 502) → 20s + 재시도.
          sleep 20
          for i in 1 2 3; do
            if curl -sSf https://${{ secrets.OPTIMUS8_HOST }}/health; then
              echo "✓ health OK"
              exit 0
            fi
            echo "retry $i/3 in 10s..."
            sleep 10
          done
          echo "✗ health check failed after 3 retries"
          exit 1
