#
# Phase I 에서 완성 — 현재는 placeholder.
# 실 활성화 전 GitHub Secrets 등록 필요:
#   - DEPLOY_SSH_KEY     (서버 SSH private key, 비root 운영 계정용)
#   - DEPLOY_SSH_HOST    = optimus8.cafe24.com
#   - DEPLOY_SSH_USER    = tradebot (비root 운영 계정 권고)
#
# 가드레일 (글로벌 §1): 평문 자격증명 절대 workflow yml 작성 금지. Secrets 사용.

name: Deploy to optimus8

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 트리거 허용

jobs:
  # Phase I 완성 후 활성화. 현재는 syntax check만.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Backend syntax check (Python)
        run: |
          if [ -d "backend" ]; then
            python3 -m compileall backend/ -q
          fi

      - name: 📦 Frontend lint (Next.js) — Phase H 활성화
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "Frontend package.json found (Phase H 완성 후 npm install + lint)"
          fi

